bind r source-file ~/.config/tmux/tmux.conf

# remove delay when hitting ESC
set -s escape-time 0

set -g mouse on

unbind M-a
set -g prefix M-a
bind M-a send-prefix

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

bind -n M-n next-window
bind -n M-p previous-window

# Status bar
set-option -g status-style "bg=#16161d,fg=#dcd7ba"
set-option -g status-position top
set-option -g status-left "#[bg=#7e9cd8,fg=#16161d] #S #[fg=#dcd7ba,bg=#16161d]|"
set-option -g status-right "#[bg=#957fb8,fg=#16161d] %H:%M "
set-window-option -g window-status-current-style "bg=#98bb6c, fg=#16161d"
set-window-option -g window-status-current-format " #I #W "
set-window-option -g window-status-format " #I #W "

bind -n M-h select-pane -L  # move left
bind -n M-j select-pane -D  # move down
bind -n M-k select-pane -U  # move up
bind -n M-l select-pane -R  # move right
